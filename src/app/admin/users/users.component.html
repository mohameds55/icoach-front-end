<section class="gold-page">
  <div class="gold-header">
    <div>
      <h2 class="gold-header-title">User Management</h2>
      <p class="gold-header-subtitle">Manage admins and coaching accounts with confidence.</p>
    </div>
    <p-button label="Add User" icon="pi pi-plus" styleClass="gold-button" />
  </div>

  <p-card styleClass="gold-card">
    <p-table
      [value]="users()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 20]"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} users"
      styleClass="gold-table"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">
            Name <p-sortIcon field="name" />
          </th>
          <th pSortableColumn="email">
            Email <p-sortIcon field="email" />
          </th>
          <th pSortableColumn="role">
            Role <p-sortIcon field="role" />
          </th>
          <th>Status</th>
          <th pSortableColumn="createdAt">
            Created At <p-sortIcon field="createdAt" />
          </th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="capitalize">{{ user.role }}</span>
          </td>
          <td>
            <p-tag
              [value]="user.isVerified ? 'Verified' : 'Unverified'"
              [severity]="user.isVerified ? 'success' : 'warn'"
            />
          </td>
          <td>{{ user.createdAt | date: 'short' }}</td>
          <td>
            <div class="flex gap-2">
              <p-button
                icon="pi pi-eye"
                [rounded]="true"
                [text]="true"
                severity="info"
                (onClick)="viewUser(user)"
              />
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                severity="secondary"
                (onClick)="editUser(user)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                severity="danger"
                (onClick)="deleteUser(user)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center py-8 text-surface-500">
            No users found
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</section>
