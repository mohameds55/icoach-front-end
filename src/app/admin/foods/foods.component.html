<section class="gold-page">
  <div class="gold-header">
    <div>
      <h2 class="gold-header-title">Food Management</h2>
      <p class="gold-header-subtitle">Track nutrition entries with clean and searchable data.</p>
    </div>
    <p-button label="Create Food" icon="pi pi-plus" (onClick)="createFood()" styleClass="gold-button" />
  </div>

  <div class="gold-toolbar">
    <p-iconField iconPosition="left" class="w-full md:w-96">
      <p-inputIcon styleClass="pi pi-search" />
      <input
        type="text"
        pInputText
        placeholder="Search foods..."
        [(ngModel)]="searchQuery"
        (ngModelChange)="onSearch()"
        class="w-full"
      />
    </p-iconField>

    <p-button
      label="High Protein"
      icon="pi pi-filter"
      [outlined]="true"
      (onClick)="filterHighProtein()"
      styleClass="gold-button-soft"
    />
    <p-button
      label="Low Calorie"
      icon="pi pi-filter"
      [outlined]="true"
      (onClick)="filterLowCalorie()"
      styleClass="gold-button-soft"
    />
    <p-button
      label="Clear Filters"
      icon="pi pi-filter-slash"
      [text]="true"
      (onClick)="clearFilters()"
      styleClass="gold-button-soft"
    />
  </div>

  <p-card styleClass="gold-card">
    <p-table
      [value]="foods()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 20]"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} foods"
      styleClass="gold-table"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">
            Name <p-sortIcon field="name" />
          </th>
          <th pSortableColumn="calories">
            Calories <p-sortIcon field="calories" />
          </th>
          <th pSortableColumn="protein">
            Protein (g) <p-sortIcon field="protein" />
          </th>
          <th pSortableColumn="carbs">
            Carbs (g) <p-sortIcon field="carbs" />
          </th>
          <th pSortableColumn="fat">
            Fat (g) <p-sortIcon field="fat" />
          </th>
          <th pSortableColumn="category">
            Category <p-sortIcon field="category" />
          </th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-food>
        <tr>
          <td>{{ food.name }}</td>
          <td>{{ food.calories }}</td>
          <td>{{ food.protein }}</td>
          <td>{{ food.carbs }}</td>
          <td>{{ food.fat }}</td>
          <td>{{ food.category }}</td>
          <td>
            <div class="flex gap-2">
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                severity="secondary"
                (onClick)="editFood(food)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                severity="danger"
                (onClick)="deleteFood(food)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="text-center py-8 text-surface-500">
            No foods found
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</section>
