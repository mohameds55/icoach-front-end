<div class="admin-shell h-screen overflow-hidden grid grid-rows-[64px_1fr]">
  <header class="topbar z-30 flex items-center gap-4 px-6 border-b border-[var(--border-soft)] bg-[#f8f3ea]">
    <div class="topbar-left min-w-52 flex items-center gap-2">
      <button
        class="btn-hamburger h-[2.2rem] w-[2.2rem] shrink-0 grid place-items-center rounded-md border border-[var(--border-soft)] bg-[#f4e8d1] text-[var(--text-primary)]"
        (click)="toggleSidebar()"
        aria-label="Toggle menu"
      >
        <i class="pi pi-bars"></i>
      </button>
      <i class="pi pi-chart-bar brand-icon"></i>
      <span class="brand-name">iCoach</span>
    </div>
    <div class="topbar-center flex-1">
      <div class="search-wrap mx-auto flex max-w-[30rem] items-center gap-2 rounded-full border border-[var(--border-soft)] bg-white px-4 py-2">
        <i class="pi pi-search"></i>
        <input type="text" placeholder="Search users, workouts, foods, saved plans" class="search-input" />
      </div>
    </div>
    <div class="topbar-right ml-auto flex items-center gap-3">
      <button class="btn-new-item">New Item</button>
      <button
        class="btn-icon-topbar h-[2.2rem] w-[2.2rem] shrink-0 grid place-items-center rounded-full border border-[var(--border-soft)] bg-[#f4e8d1] text-[var(--text-primary)]"
      >
        <i class="pi pi-bell"></i>
      </button>
      <div class="user-menu-wrap">
        <button
          class="topbar-user shrink-0 flex items-center gap-2 rounded-xl border border-[var(--border-soft)] bg-white py-1 pl-1 pr-2 text-left"
          (click)="toggleUserMenu()"
          [class.open]="userMenuOpen()"
        >
          <div class="topbar-avatar">A</div>
          <div class="user-details flex flex-col">
            <span class="user-name">{{ adminName() }}</span>
            <span class="user-role">Head Admin</span>
          </div>
          <i class="pi pi-angle-down user-menu-chevron" [class.open]="userMenuOpen()"></i>
        </button>

        @if (userMenuOpen()) {
          <div class="user-menu-dropdown">
            <button class="user-menu-item" (click)="closeUserMenu()">
              <i class="pi pi-user"></i>
              <span>Profile</span>
            </button>
            <button class="user-menu-item" (click)="closeUserMenu()">
              <i class="pi pi-cog"></i>
              <span>Settings</span>
            </button>
            <button class="user-menu-item logout" (click)="logout()" [disabled]="loggingOut()">
              <i class="pi pi-sign-out"></i>
              <span>Logout</span>
            </button>
          </div>
        }
      </div>
    </div>
  </header>

  <div class="admin-body grid grid-cols-[14rem_1fr] overflow-hidden">
    @if (sidebarOpen()) {
      <div class="sidebar-overlay" (click)="closeSidebar()"></div>
    }

    <aside class="admin-sidebar" [class.sidebar-is-open]="sidebarOpen()">
      <div class="sidebar-profile flex items-center gap-2.5 border-b border-[var(--border-soft)] px-4 py-4">
        <div class="profile-avatar">A</div>
        <div class="profile-info">
          <p class="profile-name">iCoach</p>
          <p class="profile-sub">Trusted Fitness Platform</p>
        </div>
      </div>

      <nav class="sidebar-nav flex flex-col gap-0.5 px-2.5 pt-3">
        @for (item of mainNavItems(); track item.label) {
          <a [routerLink]="item.route" routerLinkActive="nav-active" class="nav-item" (click)="closeSidebar()">
            <i [class]="item.icon"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="nav-spacer"></div>

      <div class="sidebar-footer-nav flex flex-col gap-0.5 px-2.5 pb-3">
        <a class="nav-item"><i class="pi pi-cog"></i><span>Settings</span></a>
        <a class="nav-item"><i class="pi pi-question-circle"></i><span>Help</span></a>
        <button class="nav-item nav-item-button" (click)="logout()" [disabled]="loggingOut()">
          <i class="pi pi-sign-out"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <main class="admin-main overflow-y-auto bg-[var(--cream-bg)] p-5">
      <router-outlet />
    </main>
  </div>
</div>
