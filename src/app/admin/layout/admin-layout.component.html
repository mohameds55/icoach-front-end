<div class="admin-shell">
  <header class="topbar">
    <div class="topbar-left">
      <i class="pi pi-chart-bar brand-icon"></i>
      <span class="brand-name">iCoach</span>
    </div>
    <div class="topbar-center">
      <div class="search-wrap">
        <i class="pi pi-search"></i>
        <input type="text" placeholder="Search users, workouts, foods, saved plans" class="search-input" />
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-new-item">New Item</button>
      <button class="btn-icon-topbar"><i class="pi pi-bell"></i></button>
      <div class="topbar-user">
        <div class="topbar-avatar">A</div>
        <div class="user-details">
          <span class="user-name">{{ adminName() }}</span>
          <span class="user-role">Head Admin</span>
        </div>
      </div>
    </div>
  </header>

  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="sidebar-profile">
        <div class="profile-avatar">A</div>
        <div class="profile-info">
          <p class="profile-name">iCoach</p>
          <p class="profile-sub">Trusted Fitness Platform</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        @for (item of mainNavItems(); track item.label) {
          <a [routerLink]="item.route" routerLinkActive="nav-active" class="nav-item">
            <i [class]="item.icon"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="nav-spacer"></div>

      <div class="sidebar-footer-nav">
        <a class="nav-item"><i class="pi pi-cog"></i><span>Settings</span></a>
        <a class="nav-item"><i class="pi pi-question-circle"></i><span>Help</span></a>
      </div>
    </aside>

    <main class="admin-main">
      <router-outlet />
    </main>
  </div>
</div>
